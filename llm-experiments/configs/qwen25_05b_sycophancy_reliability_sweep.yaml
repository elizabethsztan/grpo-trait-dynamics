RunConfig:
  name: sycophancy_reliability_sweep
  seed: 290402
  results_dir: results
  device: auto
  dtype: auto
  debug: false

ReliabilitySweepConfig:
  train_hint_correct_probabilities:
    - 0.1
    - 0.5
    - 0.9
  expected_pattern:
    "0.9": positive selection for agreement
    "0.5": weak or no selection for agreement
    "0.1": selection against agreement

ModelConfig:
  model_name: Qwen/Qwen2.5-0.5B-Instruct
  trust_remote_code: false
  use_gradient_checkpointing: false

LoRAConfig:
  hook_layer: 12
  r: 8
  lora_alpha: 16
  lora_dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  freeze_lm_head: true

DataConfig:
  difficulty: medium
  train_hint_correct_probability: 0.9
  eval_distributions:
    train_high_hint:
      hint_correct_probability: 0.9
      has_hint: true
    eval_balanced_hint:
      hint_correct_probability: 0.5
      has_hint: true
    eval_wrong_hint:
      hint_correct_probability: 0.0
      has_hint: true
    eval_no_hint:
      has_hint: false

GenerationConfig:
  do_sample: true
  temperature: 1.0
  top_p: 1.0
  top_k: 0
  repetition_penalty: 1.0
  max_new_tokens: 16
  min_new_tokens: 1

TrainConfig:
  num_steps: 100
  train_prompts_per_step: 16
  group_size: 8
  learning_rate: 5.0e-5
  weight_decay: 0.0
  max_grad_norm: 1.0
  eps: 1.0e-8
  kl_coef: 0.0

PriceConfig:
  enabled: true
  eval_distributions:
    - train_high_hint
    - eval_balanced_hint
    - eval_wrong_hint
  prompts_per_distribution: 32
  completions_per_prompt: 2
  compute_shuffled_null: true
  compute_reused_rollout_diagnostic: true

ObservedEvalConfig:
  eval_every: 5
  prompts_per_distribution: 128
  completions_per_prompt: 1

ActivationProbeConfig:
  enabled: true
  num_probe_pairs: 512
  normalization_pairs: 512
  pooling: mean_completion_tokens
  invariance_bank_size: 128
  invariance_every: 5
  invariance_assert_threshold: 1.0e-5
